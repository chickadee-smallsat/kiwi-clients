name: build-electron

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            dist_script: dist:linux
            artifact_path: plotly-app/dist/*.AppImage
          - os: windows-latest
            artifact_name: windows
            dist_script: dist:win:ci
            artifact_path: plotly-app/dist/*.exe
          - os: windows-11-arm
            artifact_name: windows-arm64
            dist_script: dist:win:ci:arm64
            artifact_path: plotly-app/dist/*.exe
          - os: macos-latest
            artifact_name: macos
            dist_script: dist:mac:ci
            artifact_path: plotly-app/dist/*.dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plotly-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Using package version: ${VERSION}"
          npm --prefix plotly-app version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Install Node dependencies
        run: npm --prefix plotly-app ci

      - name: Build Electron package
        run: npm --prefix plotly-app run ${{ matrix.dist_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plotly-client-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plotly-client-*
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-artifacts/**/*
